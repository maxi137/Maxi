<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-3.5 Web AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización de la barra de scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-gray-700 flex justify-between items-center glass">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tight">Phi-3.5 <span class="text-blue-400 text-sm font-normal">Local Browser AI</span></h1>
        </div>
        <div id="status" class="text-xs text-gray-400 italic">Esperando inicio...</div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="bg-gray-800 p-4 rounded-lg max-w-2xl border border-gray-700">
            <p class="text-sm">👋 ¡Hola! Soy Phi-3.5 corriendo directamente en tu navegador. La primera vez tardaré un poco en descargarme, pero después seré súper rápido.</p>
        </div>
    </main>

    <div id="progress-container" class="hidden px-4 py-2 bg-gray-800 border-t border-gray-700">
        <div class="text-[10px] uppercase mb-1 text-gray-400 tracking-widest">Descargando modelo...</div>
        <div class="w-full bg-gray-700 rounded-full h-1.5">
            <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <footer class="p-4 border-t border-gray-700 glass">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" 
                class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" 
                placeholder="Escribe tu mensaje aquí...">
            <button id="send-btn" 
                class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 text-white px-6 py-3 rounded-xl font-medium transition-all flex items-center gap-2">
                <span>Enviar</span>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-500 mt-2">Ejecutado mediante WebGPU • Sin servidores externos</p>
    </footer>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        const modelId = "Phi-3.5-mini-instruct-q4f16_1-MLC";
        let engine;

        // Función para agregar mensajes al chat
        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-4 rounded-2xl max-w-[80%] ${role === 'user' ? 'bg-blue-700 ml-auto' : 'bg-gray-800 border border-gray-700'}`;
            msgDiv.innerHTML = `<p class="text-sm">${text}</p>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Inicializar IA
        async function initAI() {
            try {
                progressContainer.classList.remove('hidden');
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        const progress = Math.round(report.progress * 100);
                        progressBar.style.width = `${progress}%`;
                        statusText.innerText = report.text.split(']')[1] || "Cargando...";
                        if (progress >= 100) progressContainer.classList.add('hidden');
                    }
                });
                statusText.innerText = "En línea";
                sendBtn.disabled = false;
            } catch (err) {
                statusText.innerText = "Error: WebGPU no soportado";
                addMessage('ai', "Error: Tu navegador no soporta WebGPU o es muy antiguo. Prueba con Chrome o Edge actualizado.");
            }
        }

        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = "";
            addMessage('user', text);
            
            statusText.innerText = "Escribiendo...";
            const messages = [{ role: "user", content: text }];
            
            const reply = await engine.chat.completions.create({ messages });
            const aiText = reply.choices[0].message.content;
            
            addMessage('ai', aiText);
            statusText.innerText = "En línea";
        };

        // Ejecutar al cargar
        initAI();
    </script>
</body>
</html>
