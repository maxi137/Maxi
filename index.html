<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-3.5 Demo Pública</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .user-msg { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #374151; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #4b5563; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-gray-700 flex justify-between items-center glass">
        <div class="flex items-center gap-2">
            <div id="led" class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
            <h1 class="text-xl font-bold tracking-tight">Phi-3.5 <span class="text-blue-400 text-sm font-normal italic">Public Demo</span></h1>
        </div>
        <div id="status" class="text-xs text-gray-400">Listo para chatear</div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
        <div class="ai-msg p-4 rounded-2xl max-w-[85%] shadow-lg">
            <p class="text-sm">¡Hola! Soy Phi-3.5. Esta es una conexión gratuita y directa para tu disertación. ¿Qué te gustaría preguntarme?</p>
        </div>
    </main>

    <footer class="p-4 border-t border-gray-700 glass">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" 
                class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" 
                placeholder="Pregúntame algo...">
            <button id="send-btn" 
                class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-medium transition-all">
                Enviar
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-500 mt-2">Conexión vía Hugging Face API Libre • Sin Registro</p>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status');
        const led = document.getElementById('led');

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-4 rounded-2xl max-w-[85%] mb-2 shadow-md ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerHTML = `<p class="text-sm">${text}</p>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function query(data) {
            // Usamos la API de "Inference" que a veces permite peticiones sin token para modelos pequeños
            const response = await fetch(
                "https://api-inference.huggingface.co/models/microsoft/Phi-3.5-mini-instruct",
                {
                    method: "POST",
                    body: JSON.stringify(data),
                }
            );
            const result = await response.json();
            return result;
        }

        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = "";
            statusText.innerText = "La IA está pensando...";
            led.classList.replace('bg-green-500', 'bg-yellow-500');

            try {
                // Intentamos la petición sin token
                const response = await query({
                    "inputs": `<|user|>\n${text}<|end|>\n<|assistant|>`,
                    "parameters": {"max_new_tokens": 250}
                });

                // Si la API nos pide token, daremos un mensaje amigable
                if(response.error && response.error.includes("Authorization")) {
                    addMessage('ai', "Nota: Para esta demo en vivo, la API gratuita de Hugging Face pide un Token. Pero no te preocupes, puedes usar el link directo de HuggingChat que es 100% libre.");
                } else {
                    let aiText = response[0].generated_text.split('<|assistant|>')[1] || response[0].generated_text;
                    addMessage('ai', aiText.trim());
                }
            } catch (err) {
                addMessage('ai', "Error de conexión. Asegúrate de tener internet para la demo.");
            } finally {
                statusText.innerText = "En línea";
                led.classList.replace('bg-yellow-500', 'bg-green-500');
            }
        };

        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };
    </script>
</body>
</html>
