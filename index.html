<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ollama System Manager v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'monospace'; }
        .panel { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 12px; }
        .console { background: #000; border: 1px solid #10b981; color: #10b981; font-size: 11px; height: 100px; overflow-y: auto; padding: 10px; }
        .user-msg { background: #1e40af; align-self: flex-end; border-radius: 12px 12px 2px 12px; padding: 10px; max-width: 80%; border: 1px solid #3b82f6; }
        .ai-msg { background: #1e293b; align-self: flex-start; border-radius: 12px 12px 12px 2px; padding: 10px; border: 1px solid #334155; max-width: 80%; }
        input, select { background: #0f172a !important; border: 1px solid #334155 !important; color: #22d3ee !important; }
        .status-ready { color: #10b981; font-weight: bold; }
        .status-missing { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 gap-4">

    <header class="panel p-4 grid grid-cols-1 md:grid-cols-4 gap-4 shadow-2xl">
        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Servidor</label>
            <input type="text" id="server-url" class="w-full p-2 rounded text-sm" value="http://localhost:11434">
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Modelo</label>
            <select id="model-select" class="w-full p-2 rounded text-sm">
                <option value="phi3.5">Phi 3.5 (Microsoft)</option>
                <option value="gemma2:2b">Gemma 2 2B (Google)</option>
                <option value="llama3.1:8b">Llama 3.1 (Meta)</option>
                <option value="tinyllama">TinyLlama (Lite)</option>
            </select>
        </div>

        <div class="flex flex-col justify-center">
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Estado Local</label>
            <div id="model-status" class="text-xs italic">Verificando...</div>
        </div>

        <div class="flex items-end">
            <button id="inject-btn" class="w-full bg-slate-800 hover:bg-amber-600 text-slate-400 hover:text-black font-black py-2 rounded uppercase text-xs transition-all border border-slate-700">
                Inyectar (Descargar)
            </button>
        </div>
    </header>

    <div id="terminal" class="console rounded-lg shadow-inner">
        > OLLAMA ENGINE READY...
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col panel">
        <div class="ai-msg text-sm">
            <b>SISTEMA:</b> Selecciona un modelo. Si el estado es <span class="status-ready text-[10px]">READY</span>, puedes chatear de inmediato. Si no, usa el botón "Inyectar".
        </div>
    </main>

    <footer class="flex gap-2">
        <input type="text" id="user-input" class="flex-1 p-4 rounded-xl outline-none focus:border-cyan-500 transition-all bg-slate-900 border border-slate-700" placeholder="Escribe un mensaje...">
        <button id="send-btn" class="bg-cyan-600 hover:bg-cyan-500 px-10 rounded-xl font-bold uppercase transition-transform active:scale-95">Chat</button>
    </footer>

    <script>
        const terminal = document.getElementById('terminal');
        const serverUrl = document.getElementById('server-url');
        const modelSelect = document.getElementById('model-select');
        const modelStatus = document.getElementById('model-status');
        const injectBtn = document.getElementById('inject-btn');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function log(msg) {
            terminal.innerHTML += `<br>> ${msg}`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            div.innerHTML = `<p class="text-[10px] font-bold text-cyan-400 mb-1 uppercase">${role}</p><p class="text-sm">${text}</p>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- VERIFICAR SI EL MODELO EXISTE ---
        async function checkModel() {
            const url = serverUrl.value.replace(/\/$/, "");
            const selectedModel = modelSelect.value;
            modelStatus.innerHTML = "Verificando...";
            modelStatus.className = "text-xs italic text-slate-500";

            try {
                const response = await fetch(`${url}/api/tags`);
                const data = await response.json();
                const exists = data.models.some(m => m.name.startsWith(selectedModel));

                if (exists) {
                    modelStatus.innerHTML = "● READY";
                    modelStatus.className = "text-xs status-ready";
                    injectBtn.className = "w-full bg-slate-800 text-slate-500 py-2 rounded uppercase text-xs cursor-not-allowed border border-slate-700";
                    log(`Modelo ${selectedModel} detectado localmente.`);
                } else {
                    modelStatus.innerHTML = "○ MISSING";
                    modelStatus.className = "text-xs status-missing";
                    injectBtn.className = "w-full bg-amber-600 hover:bg-amber-500 text-black font-black py-2 rounded uppercase text-xs transition-all";
                    log(`Atención: ${selectedModel} no está en el sistema.`);
                }
            } catch (err) {
                modelStatus.innerHTML = "ERROR DE LINK";
                log("Error al conectar con Ollama. Revisa el link y CORS.");
            }
        }

        modelSelect.onchange = checkModel;
        window.onload = checkModel;

        // --- INYECTAR (SOLO SI ES NECESARIO) ---
        injectBtn.onclick = async () => {
            const url = serverUrl.value.replace(/\/$/, "");
            const model = modelSelect.value;
            
            log(`INICIANDO DESCARGA: ${model}...`);
            injectBtn.disabled = true;

            try {
                const response = await fetch(`${url}/api/pull`, {
                    method: 'POST',
                    body: JSON.stringify({ name: model })
                });

                const reader = response.body.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    try {
                        const status = JSON.parse(chunk);
                        if (status.status) log(status.status);
                    } catch(e) {}
                }
                log(`COMPLETADO.`);
                checkModel();
            } catch (err) {
                log(`ERROR en inyección.`);
            } finally {
                injectBtn.disabled = false;
            }
        };

        // --- CHAT ---
        async function runChat() {
            const prompt = userInput.value.trim();
            const url = serverUrl.value.replace(/\/$/, "");
            if (!prompt) return;

            addMessage('user', prompt);
            userInput.value = "";

            try {
                const response = await fetch(`${url}/api/generate`, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: modelSelect.value,
                        prompt: prompt,
                        stream: false
                    })
                });
                const data = await response.json();
                addMessage('ai', data.response);
            } catch (err) {
                addMessage('ai', "ERROR: Sin respuesta del motor local.");
            }
        }

        sendBtn.onclick = runChat;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') runChat(); };
    </script>
</body>
</html>
