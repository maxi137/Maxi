<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralView Pro: IA con Memoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .bounding-box { border: 2px solid #3b82f6; position: absolute; cursor: pointer; transition: all 0.2s; }
        .label { background: #3b82f6; color: white; position: absolute; top: -22px; left: -2px; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; white-space: nowrap; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-gray-800 flex justify-between items-center glass">
        <div class="flex items-center gap-2">
            <div id="status-icon" class="w-3 h-3 bg-red-500 rounded-full"></div>
            <h1 class="text-xl font-bold tracking-tight">Neural<span class="text-blue-500">View</span> <span class="text-[10px] bg-blue-900 text-blue-200 px-2 py-0.5 rounded ml-2 uppercase">v2.0</span></h1>
        </div>
        <div id="status" class="text-xs text-gray-500 italic">Inicializando...</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r border-gray-800 bg-gray-900/50 p-4 flex flex-col">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Historial y Memoria</h2>
            <div id="history-list" class="flex-1 overflow-y-auto space-y-2">
                </div>
            <button onclick="clearMemory()" class="mt-4 text-[10px] text-red-400 hover:text-red-300 transition-colors uppercase font-bold">Borrar Memoria</button>
        </aside>

        <main class="flex-1 flex flex-col items-center p-6 overflow-y-auto">
            
            <div class="flex bg-gray-800 p-1 rounded-xl border border-gray-700 mb-6">
                <button id="mode-upload" class="px-6 py-2 rounded-lg bg-blue-600 text-white font-medium transition-all">Archivo</button>
                <button id="mode-camera" class="px-6 py-2 rounded-lg text-gray-400 hover:text-white transition-all">Cámara</button>
            </div>

            <div id="view-container" class="relative bg-gray-900 rounded-2xl border border-gray-800 w-full max-w-3xl flex justify-center items-center min-h-[450px] shadow-2xl overflow-hidden">
                
                <div id="upload-area" class="flex flex-col items-center p-12 w-full cursor-pointer hover:bg-gray-800/50 transition-all border-2 border-dashed border-gray-700 m-4 rounded-xl">
                    <p class="text-gray-500 text-center">Click o arrastra imagen aquí</p>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <video id="webcam" class="hidden w-full h-auto" autoplay playsinline></video>

                <div id="canvas-wrapper" class="hidden relative">
                    <img id="image-display" class="max-w-full h-auto">
                    <div id="box-container" class="absolute top-0 left-0 w-full h-full"></div>
                </div>
            </div>
            <p class="mt-4 text-xs text-gray-600 italic italic">Tip: Haz clic en el recuadro azul para nombrar a tu mascota.</p>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const video = document.getElementById('webcam');
        const imageDisplay = document.getElementById('image-display');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const boxContainer = document.getElementById('box-container');
        const historyList = document.getElementById('history-list');
        const statusText = document.getElementById('status');

        let model;
        let memory = JSON.parse(localStorage.getItem('ai_memory') || '{}');

        async function init() {
            model = await cocoSsd.load();
            statusText.innerText = "IA Lista";
            document.getElementById('status-icon').className = "w-3 h-3 bg-green-500 rounded-full";
            renderHistory();
        }

        function saveNameToMemory(originalClass, customName) {
            memory[originalClass.toLowerCase()] = customName;
            localStorage.setItem('ai_memory', JSON.stringify(memory));
            renderHistory();
        }

        function clearMemory() {
            localStorage.removeItem('ai_memory');
            memory = {};
            renderHistory();
            location.reload();
        }

        function renderHistory() {
            historyList.innerHTML = Object.entries(memory).map(([id, name]) => `
                <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 animate-fade-in">
                    <div class="text-[10px] text-blue-400 uppercase font-bold">${id}</div>
                    <div class="text-sm text-gray-100">${name}</div>
                </div>
            `).join('') || '<p class="text-xs text-gray-600 italic">No hay registros...</p>';
        }

        async function detect(element) {
            boxContainer.innerHTML = "";
            const predictions = await model.detect(element);
            
            predictions.forEach(p => {
                if (['dog', 'cat', 'person'].includes(p.class)) {
                    const [x, y, w, h] = p.bbox;
                    const customName = memory[p.class] || p.class;
                    
                    const box = document.createElement('div');
                    box.className = 'bounding-box';
                    box.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px;`;
                    
                    box.onclick = () => {
                        const newName = prompt(`¿Cómo se llama este ${p.class}?`, customName);
                        if (newName) {
                            saveNameToMemory(p.class, newName);
                            detect(element); // Re-detectar para actualizar etiqueta
                        }
                    };

                    const label = document.createElement('div');
                    label.className = 'label';
                    label.innerText = `${customName} (${Math.round(p.score * 100)}%)`;
                    
                    box.appendChild(label);
                    boxContainer.appendChild(box);
                }
            });
        }

        // Lógica de carga de archivos
        document.getElementById('upload-area').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                imageDisplay.src = f.target.result;
                canvasWrapper.classList.remove('hidden');
                document.getElementById('upload-area').classList.add('hidden');
                video.classList.add('hidden');
                imageDisplay.onload = () => detect(imageDisplay);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Lógica de cámara
        document.getElementById('mode-camera').onclick = async () => {
            canvasWrapper.classList.remove('hidden');
            document.getElementById('upload-area').classList.add('hidden');
            imageDisplay.classList.add('hidden');
            video.classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            setInterval(() => detect(video), 1000); // Detecta cada segundo
        };

        init();
    </script>
</body>
</html>
