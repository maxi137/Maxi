<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama WebUI - Enterprise</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #0d0d0d; color: #ececec; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #000; width: 280px; transition: transform 0.3s ease; }
        .chat-card { max-width: 800px; margin: 0 auto; width: 100%; }
        .user-msg { background-color: #212121; border-radius: 1.5rem; padding: 1rem 1.5rem; margin-left: auto; max-width: 85%; }
        .ai-msg { padding: 1rem 0; width: 100%; }
        .server-input { background: transparent; border: 1px solid #333; transition: all 0.2s; }
        .server-input:focus { border-color: #10b981; outline: none; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        pre { background: #171717 !important; border-radius: 12px; border: 1px solid #333; padding: 1rem !important; }
        .glass-nav { background: rgba(13, 13, 13, 0.8); backdrop-filter: blur(10px); }
        .model-btn { border: 1px solid transparent; }
        .model-btn.active { border-color: #10b981; background: #171717; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside id="sidebar" class="sidebar h-full flex flex-col border-r border-white/5 z-20">
        <div class="p-5 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-black font-bold">O</div>
                <span class="font-bold tracking-tight">Ollama UI</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500"><i data-lucide="x"></i></button>
        </div>

        <div class="px-3 mb-6">
            <button onclick="newChat()" class="w-full flex items-center justify-between p-3 rounded-xl border border-white/10 hover:bg-white/5 transition group">
                <span class="text-sm font-medium">Nuevo Chat</span>
                <i data-lucide="plus" class="w-4 h-4 text-gray-500 group-hover:text-white"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 space-y-1">
            <p class="text-[10px] font-bold text-gray-500 uppercase px-2 mb-2 tracking-widest">Modelos Disponibles</p>
            <div id="models-list" class="space-y-1">
                </div>
        </div>

        <div class="p-4 border-t border-white/5 space-y-4">
            <div class="space-y-2">
                <input type="text" id="manual-model" placeholder="Inyectar modelo..." class="w-full text-xs p-2 rounded-lg bg-[#171717] border border-white/10 outline-none focus:border-emerald-500">
                <button onclick="injectModel()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-black font-bold rounded-lg text-[10px] uppercase transition">Inyectar</button>
            </div>
            <div class="flex items-center gap-3 p-2 bg-white/5 rounded-xl">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-[10px] font-bold">USER</div>
                <span class="text-xs font-medium">Investigador</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <header class="glass-nav h-16 border-b border-white/5 flex items-center px-6 justify-between sticky top-0 z-10">
            <div class="flex items-center gap-4 flex-1">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-white/5 rounded-lg"><i data-lucide="menu"></i></button>
                <div class="flex items-center gap-2 max-w-sm w-full">
                    <input type="text" id="server-url" value="https://zk9krs-11434.csb.app" class="server-input w-full text-xs rounded-full px-4 py-1.5 text-gray-400">
                    <button id="connect-btn" onclick="connectServer()" class="px-4 py-1.5 bg-white text-black text-xs font-bold rounded-full hover:bg-emerald-400 transition">Conectar</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="active-model-name" class="text-xs font-mono text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full">Offline</span>
                <div id="status-led" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
            </div>
        </header>

        <div id="chat-scroller" class="flex-1 overflow-y-auto px-4 py-8">
            <div id="chat-display" class="chat-card space-y-10">
                <div id="welcome-screen" class="flex flex-col items-center justify-center py-20 text-center">
                    <div class="w-16 h-16 bg-emerald-600/20 rounded-2xl flex items-center justify-center mb-6">
                        <i data-lucide="sparkles" class="w-10 h-10 text-emerald-500"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">¿Cómo puedo ayudarte hoy?</h2>
                    <p class="text-gray-500 text-sm max-w-sm">Conéctate al servidor local e inyecta un modelo para comenzar la inferencia.</p>
                </div>
            </div>
        </div>

        <footer class="p-6">
            <div class="chat-card relative">
                <div class="bg-[#212121] rounded-2xl border border-white/10 shadow-2xl p-2 transition-all focus-within:border-emerald-500/50">
                    <textarea id="user-input" rows="1" class="w-full bg-transparent p-3 outline-none resize-none text-sm placeholder-gray-500" placeholder="Pregunta lo que sea..."></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <div class="flex gap-2">
                            <button class="p-2 hover:bg-white/5 rounded-lg text-gray-500"><i data-lucide="paperclip" class="w-4 h-4"></i></button>
                            <button class="p-2 hover:bg-white/5 rounded-lg text-gray-500"><i data-lucide="image" class="w-4 h-4"></i></button>
                        </div>
                        <button id="send-btn" class="p-2.5 bg-white text-black rounded-xl hover:bg-emerald-400 transition transform active:scale-90">
                            <i data-lucide="arrow-up" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[9px] text-center text-gray-600 mt-4 uppercase tracking-[0.3em]">Hardware Local: GPU/CPU Active • Ollama Engine</p>
            </div>
        </footer>
    </main>

    <script>
        lucide.createIcons();
        const md = window.markdownit({ highlight: (str, lang) => hljs.highlightAuto(str).value });
        let selectedModel = "";

        // --- CONECTAR AL SERVIDOR ---
        async function connectServer() {
            const url = document.getElementById('server-url').value.replace(/\/$/, "");
            const btn = document.getElementById('connect-btn');
            const led = document.getElementById('status-led');
            
            btn.innerText = "Conectando...";
            try {
                const res = await fetch(`${url}/api/tags`);
                const data = await res.json();
                
                led.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                btn.innerText = "Conectado";
                btn.className = "px-4 py-1.5 bg-emerald-600 text-white text-xs font-bold rounded-full";
                renderModels(data.models);
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Conexión Exitosa', showConfirmButton: false, timer: 2000, background: '#171717', color: '#fff' });
            } catch (e) {
                led.className = "w-2.5 h-2.5 rounded-full bg-red-500";
                btn.innerText = "Reintentar";
                Swal.fire({ icon: 'error', title: 'Error de Conexión', text: 'Asegúrate de que Ollama esté corriendo con OLLAMA_ORIGINS="*"' });
            }
        }

        // --- RENDER MODELOS EN SIDEBAR ---
        function renderModels(models) {
            const container = document.getElementById('models-list');
            container.innerHTML = '';
            models.forEach(m => {
                const div = document.createElement('div');
                div.className = `model-btn flex justify-between items-center p-2.5 rounded-xl cursor-pointer hover:bg-white/5 transition ${selectedModel === m.name ? 'active' : ''}`;
                div.onclick = () => {
                    selectedModel = m.name;
                    document.getElementById('active-model-name').innerText = m.name;
                    renderModels(models);
                };
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i data-lucide="layers" class="w-4 h-4 text-emerald-500"></i>
                        <span class="text-xs font-medium text-gray-300">${m.name}</span>
                    </div>
                    <button onclick="deleteModel(event, '${m.name}')" class="text-gray-600 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- INYECTAR MODELO (PULL) ---
        async function injectModel() {
            const name = document.getElementById('manual-model').value;
            const url = document.getElementById('server-url').value;
            if(!name) return;

            Swal.fire({ title: 'Inyectando...', text: `Pulleando pesos de ${name}`, allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#171717', color: '#fff' });

            try {
                const res = await fetch(`${url}/api/pull`, { method: 'POST', body: JSON.stringify({ name }) });
                const reader = res.body.getReader();
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                }
                Swal.close();
                connectServer();
            } catch (e) { Swal.fire('Error', 'No se pudo inyectar el modelo', 'error'); }
        }

        // --- CHAT SYSTEM (STREAMING) ---
        async function runChat() {
            const input = document.getElementById('user-input').value.trim();
            const url = document.getElementById('server-url').value;
            if(!input || !selectedModel) return;

            // Limpiar pantalla inicial
            if(document.getElementById('welcome-screen')) document.getElementById('welcome-screen').remove();

            appendMessage('user', input);
            document.getElementById('user-input').value = '';
            
            const aiMsgDiv = createAiMessagePlaceholder();
            let fullText = "";

            try {
                const res = await fetch(`${url}/api/generate`, {
                    method: 'POST',
                    body: JSON.stringify({ model: selectedModel, prompt: input, stream: true })
                });

                const reader = res.body.getReader();
                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    const chunk = JSON.parse(new TextDecoder().decode(value));
                    fullText += chunk.response;
                    aiMsgDiv.innerHTML = md.render(fullText);
                    document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
                }
            } catch(e) { aiMsgDiv.innerHTML = "Error en la inferencia."; }
        }

        // --- UTILS ---
        function appendMessage(role, text) {
            const display = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            div.innerHTML = role === 'user' ? text : md.render(text);
            display.appendChild(div);
            document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
        }

        function createAiMessagePlaceholder() {
            const display = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = "ai-msg flex gap-6";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center flex-shrink-0"><i data-lucide="bot" class="w-5 h-5 text-black"></i></div>
                <div class="prose prose-invert prose-emerald text-sm flex-1">...</div>
            `;
            display.appendChild(div);
            lucide.createIcons();
            return div.querySelector('.prose');
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(-100%)' ? 'translateX(0)' : 'translateX(-100%)';
        }

        document.getElementById('send-btn').onclick = runChat;
        document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runChat(); } };
    </script>
</body>
</html>
